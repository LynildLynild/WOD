<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<title>WOD Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --pur: #6C7DEB; --dark: #0e0f1a; --card: #13151f;
    --border: #1e2235; --text: #e8eaff; --muted: #5a6080;
    --lilac: #9581EB; --pale: #6CCDEB; --teal: #6EEBE0;
  }
  body {
    font-family: 'Arial Black', 'Arial Bold', Arial, sans-serif;
    background: var(--dark); color: var(--text);
    height: 100dvh; overflow: hidden;
    display: flex; flex-direction: column;
  }

  /* HEADER */
  .wod-header {
    background: var(--pur); padding: 12px 16px 10px;
    display: flex; justify-content: space-between; align-items: flex-end; flex-shrink: 0;
  }
  .wod-label { font-size: 10px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.55); }
  .wod-title { font-size: 22px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; color: #fff; }
  .hbtn { background: rgba(0,0,0,0.25); border: none; border-radius: 8px; color: #fff; font-size: 18px; padding: 6px 11px; cursor: pointer; font-family: inherit; -webkit-tap-highlight-color: transparent; }

  /* BUY-IN */
  .buyin-bar {
    background: #120e1a; border-bottom: 2px solid var(--pur);
    padding: 7px 16px; flex-shrink: 0; display: flex; align-items: center; gap: 10px;
  }
  .buyin-label { font-size: 9px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; color: var(--pur); white-space: nowrap; }
  .buyin-text { font-size: 13px; font-weight: 900; text-transform: uppercase; color: var(--lilac); }

  /* CARDS */
  .cards {
    flex: 1; display: flex; flex-direction: column;
    gap: 12px; padding: 16px 14px; min-height: 0;
  }

  .card {
    flex: 1; background: var(--card); border-radius: 20px;
    border: 1px solid var(--border); position: relative; overflow: hidden;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px; padding: 20px 16px;
  }
  .card:first-child::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: var(--pur);
  }
  .card:last-child::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: var(--teal);
  }

  .card-reps {
    font-size: clamp(56px, 16vw, 90px); font-weight: 900;
    color: var(--lilac); line-height: 1;
  }
  .card:last-child .card-reps { color: var(--teal); }

  .card-name {
    font-size: clamp(20px, 5.5vw, 32px); font-weight: 900;
    text-transform: uppercase; text-align: center; line-height: 1.2;
    color: var(--text);
  }
  .card-label {
    font-size: 13px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 2px;
  }

  /* BOTTOM */
  .bottom-bar { padding: 0 14px 14px; flex-shrink: 0; }
  .reload-btn {
    width: 100%; background: var(--pur); color: #fff;
    border: none; border-radius: 14px; padding: 16px;
    font-family: inherit; font-size: 17px; font-weight: 900;
    text-transform: uppercase; letter-spacing: 1px;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    transition: opacity 0.15s, transform 0.1s;
  }
  .reload-btn:active { opacity: 0.7; transform: scale(0.98); }

  /* SETTINGS VIEW */
  #settingsView {
    display: none; flex-direction: column;
    height: 100dvh; padding: 20px 16px 16px; gap: 12px; overflow: hidden;
  }
  #settingsView.visible { display: flex; }
  .settings-header { display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .settings-header h2 { font-size: 20px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
  .done-btn { background: var(--pur); color: #fff; border: none; font-size: 14px; padding: 8px 18px; border-radius: 8px; font-family: inherit; font-weight: 900; cursor: pointer; }
  .hint { font-size: 12px; color: #555; font-family: Arial, sans-serif; font-weight: normal; flex-shrink: 0; }
  #exerciseList { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; -webkit-overflow-scrolling: touch; min-height: 0; }
  .ex-row { display: flex; gap: 8px; align-items: center; }
  .ex-row input { flex: 1; background: #1a1f35; border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 10px 12px; outline: none; }
  .ex-row input:focus { border-color: var(--pur); }
  .del-btn { background: #1a1035; color: var(--lilac); border: none; font-size: 16px; padding: 9px 12px; border-radius: 8px; cursor: pointer; flex-shrink: 0; }
  #addExBtn { background: #1a1f35; color: var(--teal); border: none; font-size: 13px; padding: 12px; border-radius: 10px; width: 100%; font-family: inherit; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; flex-shrink: 0; }
</style>
</head>
<body>

<!-- WOD VIEW -->
<div id="wodView">
  <div class="wod-header">
    <div>
      <div class="wod-label">Today's</div>
      <div class="wod-title">Workout of the Day</div>
    </div>
    <button class="hbtn" id="settingsBtn">⚙️</button>
  </div>

  <div class="buyin-bar">
    <div class="buyin-label">Buy-in</div>
    <div class="buyin-text">500 m Row &nbsp;+&nbsp; 20 kcal Assault Bike</div>
  </div>

  <div class="cards">
    <div class="card">
      <div class="card-reps" id="reps1">—</div>
      <div class="card-name" id="name1">—</div>
      <div class="card-label" id="label1"></div>
    </div>
    <div class="card">
      <div class="card-reps" id="reps2">—</div>
      <div class="card-name" id="name2">—</div>
      <div class="card-label" id="label2"></div>
    </div>
  </div>

  <div class="bottom-bar">
    <button class="reload-btn" onclick="generateWOD()">⟳ New Superset</button>
  </div>
</div>

<!-- SETTINGS VIEW -->
<div id="settingsView">
  <div class="settings-header">
    <h2>Exercises</h2>
    <button class="done-btn" onclick="saveAndClose()">Done</button>
  </div>
  <div class="hint">Edit or add exercises. At least 2 needed.</div>
  <div id="exerciseList"></div>
  <button id="addExBtn" onclick="addRow()">+ Add Exercise</button>
</div>

<script>
const STORAGE_KEY = 'wod_exercises_v3';
const defaults = [
  "Goblet Squat","Romanian Deadlift","Dumbbell Bench Press","Weighted Bridge",
  "Dips","Dumbbell Press","Banded Pull Ups","Halo to Wood Chop",
  "Power Clean 'n' Jerk","Power Snatch","Skull Crushers","Dumbbell Row",
  "Push Ups","Renegade Rows","Kettlebell Swing","Box Jumps",
  "Thruster","Wall Balls","Burpee Pull Ups","Toes to Bar"
];
const repOptions = [
  [10,"Reps"],[12,"Reps"],[15,"Reps"],[8,"Reps"],
  [20,"Reps"],[21,"Reps"],[10,"Each Side"],[12,"Each Side"],[5,"Heavy"],[10,"Unbroken"]
];
let exercises = [];

function load() {
  try { const s = localStorage.getItem(STORAGE_KEY); exercises = s ? JSON.parse(s) : [...defaults]; }
  catch(e) { exercises = [...defaults]; }
}
function save() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(exercises)); } catch(e) {} }

function showSettings() {
  document.getElementById('wodView').style.display = 'none';
  document.getElementById('settingsView').classList.add('visible');
  document.getElementById('exerciseList').innerHTML = '';
  exercises.forEach(e => addRow(e));
}
function saveAndClose() {
  exercises = Array.from(document.querySelectorAll('#exerciseList .ex-row input')).map(i=>i.value.trim()).filter(Boolean);
  save();
  document.getElementById('settingsView').classList.remove('visible');
  document.getElementById('wodView').style.display = '';
  generateWOD();
}

function shuffle(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function generateWOD() {
  if (exercises.length < 2) return;
  const [ex1, ex2] = shuffle(exercises);
  const [r1,l1] = repOptions[Math.floor(Math.random()*repOptions.length)];
  const [r2,l2] = repOptions[Math.floor(Math.random()*repOptions.length)];
  document.getElementById('reps1').textContent = r1;
  document.getElementById('name1').textContent = ex1;
  document.getElementById('label1').textContent = l1;
  document.getElementById('reps2').textContent = r2;
  document.getElementById('name2').textContent = ex2;
  document.getElementById('label2').textContent = l2;
}

function addRow(text='') {
  const list = document.getElementById('exerciseList'), row = document.createElement('div');
  row.className = 'ex-row';
  row.innerHTML = `<input type="text" placeholder="Exercise name…" value="${text.replace(/"/g,'&quot;')}"><button class="del-btn" onclick="this.parentElement.remove()">✕</button>`;
  list.appendChild(row); if (!text) row.querySelector('input').focus();
}

async function requestWakeLock() { if('wakeLock'in navigator){try{await navigator.wakeLock.request('screen');}catch(e){}} }

document.getElementById('settingsBtn').onclick = showSettings;
load(); requestWakeLock();
document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible') requestWakeLock(); });
generateWOD();
</script>
</body>
</html>
